# SECURITY NOTE (security review finding H4): nothing in this file terminates TLS. `web` (nginx)
# listens on plain HTTP only (see web/nginx.conf's own note), and `api`/`db` aren't published to the
# host at all — they're only reachable from other containers on this compose network. Deploying this
# stack anywhere reachable over the open internet REQUIRES a TLS-terminating proxy/load balancer in
# front of the `web` service; this compose file does not provide or enforce one.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: enkl
      POSTGRES_USER: enkl
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enkl"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Enkl.Api/Dockerfile
    environment:
      ConnectionStrings__Default: "Host=db;Database=enkl;Username=enkl;Password=${DB_PASSWORD:?DB_PASSWORD must be set in .env}"
      # enkl_public_query's password is a literal baked into the AddSavedQueryApiExposure
      # migration's own SQL, not a deployment secret (see Program.cs's own note on why) — this must
      # match that literal exactly, not be independently overridable via .env like DB_PASSWORD is.
      ConnectionStrings__PublicQuery: "Host=db;Database=enkl;Username=enkl_public_query;Password=enkl_public_query_dev_password"
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY must be set in .env}
      # v4 Phase 1 AI Assistant — optional. Left unset (default ""), the feature just throws a clear
      # error when used rather than failing the whole stack's startup (see AiAssistantService.cs).
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY:-}
      App__PublicBaseUrl: ${PUBLIC_BASE_URL:-http://localhost}
      RunMigrationsOnStartup: "true"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
