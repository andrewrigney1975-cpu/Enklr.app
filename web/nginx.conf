
# SECURITY NOTE (security review finding H4): this server block only ever listens on plain HTTP —
# there is no `listen 443 ssl`, no redirect, no HSTS here. As shipped, the entire stack (this nginx,
# the api container behind it, JWTs, credentials) communicates in plaintext. This is only safe if
# something in front of this container (a cloud load balancer, an ingress controller, a reverse
# proxy on the host) actually terminates TLS before traffic reaches here — that is an ASSUMPTION,
# not something this compose file enforces or even checks. Before any real deployment, either:
#   (a) confirm a TLS-terminating proxy genuinely sits in front of this, and that IT sets
#       X-Forwarded-Proto (the api container trusts it unconditionally — see Program.cs's
#       ForwardedHeadersOptions, safe here since this api is never reachable except through this
#       nginx — docker-compose.yml publishes no host port for it), or
#   (b) add a real `listen 443 ssl` server block with actual certificates here instead.
server {
  listen 80;
  root /usr/share/nginx/html;

  # Long-lived SSE stream (src/js/features/live-updates.js) — needs buffering/caching off so events
  # reach the browser as they're written rather than sitting in nginx's proxy buffer until it fills or
  # the connection closes, and a long read timeout since the connection is meant to stay open for
  # hours, not the default 60s.
  location /api/events/ {
    proxy_pass http://api:8080/api/events/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location /api/ {
    proxy_pass http://api:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
  }

  # Both the .NET and PHP API tiers expose an identical GET /health at their own root, not under
  # /api/ (see Program.cs / routes.php) — proxied here so the frontend's reachability probe
  # (api.js's pollApiReachability, used to hide "Migrate to Server" when no API is available) has a
  # same-origin path to hit regardless of which tier is actually deployed behind this nginx.
  location = /health {
    proxy_pass http://api:8080/health;
    proxy_set_header Host $host;
  }

  location / {
    try_files /index.html =404;
  }
}
