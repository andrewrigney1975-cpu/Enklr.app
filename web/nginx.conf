
# SECURITY NOTE (security review finding H4): this server block only ever listens on plain HTTP —
# there is no `listen 443 ssl`, no redirect, no HSTS here. As shipped, the entire stack (this nginx,
# the api container behind it, JWTs, credentials) communicates in plaintext. This is only safe if
# something in front of this container (a cloud load balancer, an ingress controller, a reverse
# proxy on the host) actually terminates TLS before traffic reaches here — that is an ASSUMPTION,
# not something this compose file enforces or even checks. Before any real deployment, either:
#   (a) confirm a TLS-terminating proxy genuinely sits in front of this, and that IT sets
#       X-Forwarded-Proto (the api container trusts it unconditionally — see Program.cs's
#       ForwardedHeadersOptions, safe here since this api is never reachable except through this
#       nginx — docker-compose.yml publishes no host port for it), or
#   (b) add a real `listen 443 ssl` server block with actual certificates here instead.
server {
  listen 80;
  root /usr/share/nginx/html;

  # Security review finding M6: no security headers were sent anywhere in the stack. Set at the
  # server level (not per-location) so they apply to every response, including the proxied /api/
  # locations below.
  #   - script-src/style-src keep 'unsafe-inline': build.js inlines the ENTIRE bundled JS and CSS
  #     directly into dist/index.html as a single self-contained file (see its own comments) — there
  #     is no separate .js/.css file this ships as, so a strict CSP without 'unsafe-inline' would
  #     break the whole app. Tightening this to a hash/nonce-based policy tied to the build step is a
  #     reasonable follow-up, but a bigger change than this pass takes on.
  #   - script-src also needs 'unsafe-eval': the Advanced Query tool (features/query-engine.js) bundles
  #     AlaSQL, which compiles a parsed query into an executable JS function via `new Function(...)`
  #     internally for performance — without this the browser blocks that compilation outright and
  #     every query throws "Evaluating a string as JavaScript violates ... 'unsafe-eval'". User-typed
  #     SQL text itself is never eval'd/Function'd directly by our own code (query-engine.js never
  #     calls eval/Function itself) — this is purely AlaSQL's own internal query-compilation strategy,
  #     which is why relaxing this was accepted as part of the AlaSQL trade-off (see CLAUDE.md §15)
  #     rather than something to work around.
  #   - fonts.googleapis.com/fonts.gstatic.com allowed for the Google Fonts <link> in index.html.
  #   - data: allowed for img-src/manifest-src/font-src — the favicon, PWA manifest, and app icons
  #     are all embedded as data: URIs directly in index.html (again, single self-contained file).
  #   - blob: also allowed for img-src — every "Export as PNG" control (features/svg-export.js's
  #     exportSvgElementAsPng) rasterizes a chart by loading its serialized SVG into an <img> via a
  #     URL.createObjectURL blob: URL before drawing it to a <canvas>; without this the browser blocks
  #     that <img> load outright and every PNG export in the app fails (SVG export is unaffected — it
  #     downloads the blob directly, never loads it as an <img>). This is same-origin-generated
  #     content the page itself created, not an attacker-suppliable URL, so it doesn't weaken the
  #     policy's actual intent the way allowing arbitrary/remote img-src hosts would.
  #   - frame-ancestors 'none' (plus the legacy X-Frame-Options fallback) blocks this app from ever
  #     being framed by another origin — clickjacking protection.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Only takes effect once a browser actually receives this over HTTPS (see the TLS-termination note
  # above) — harmless to send unconditionally otherwise, browsers ignore it over plain HTTP.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; manifest-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

  # Long-lived SSE stream (src/js/features/live-updates.js) — needs buffering/caching off so events
  # reach the browser as they're written rather than sitting in nginx's proxy buffer until it fills or
  # the connection closes, and a long read timeout since the connection is meant to stay open for
  # hours, not the default 60s.
  # ARCHITECTURE-REVIEW.md finding #5: $request_id is nginx's own built-in per-request unique hex
  # string (no config needed to generate it) — forwarded to whichever backend tier is deployed as the
  # correlation ID, so it becomes the single source of truth tying one nginx access-log entry to that
  # same request's structured log lines in `docker compose logs api`. Both tiers' correlation-ID
  # middleware trusts this header unconditionally and only generates its own fallback ID if a request
  # ever reaches them without it (i.e. bypassing nginx entirely).
  location /api/events/ {
    proxy_pass http://api:8080/api/events/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Correlation-Id $request_id;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location /api/ {
    proxy_pass http://api:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Correlation-Id $request_id;
    proxy_http_version 1.1;
  }

  # Both the .NET and PHP API tiers expose an identical GET /health at their own root, not under
  # /api/ (see Program.cs / routes.php) — proxied here so the frontend's reachability probe
  # (api.js's pollApiReachability, used to hide "Migrate to Server" when no API is available) has a
  # same-origin path to hit regardless of which tier is actually deployed behind this nginx.
  location = /health {
    proxy_pass http://api:8080/health;
    proxy_set_header Host $host;
    proxy_set_header X-Correlation-Id $request_id;
  }

  location / {
    try_files /index.html =404;
  }
}
